<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>𝓥𝓲𝓭𝓮𝓸 𝓖𝓪𝓵𝓵𝓮𝓻𝔂</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #121212; /* Warna gelap agar lebih premium */
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 854px;
            margin: auto;
        }

        /* Kontainer Video Responsif (Rasio 16:9) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Ratio */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Area Iklan */
        .ad-section {
            margin-top: 20px;
            min-height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>𝓥𝓲𝓭𝓮𝓸 𝓟𝓵𝓪𝔂𝓮𝓻</h1>

        <!-- Wadah Video -->
        <div class="video-wrapper">
            <iframe 
                src="https://cdn.videy.co/Vdghj3qe1.mp4" 
                allowfullscreen 
                allow="autoplay; encrypted-media">
            </iframe>
        </div>

        <!-- Wadah Iklan -->
        <div class="ad-section">
            <script async="async" data-cfasync="false" src="https://hypothesisgarden.com"></script>
            <div id="container-c41a23ff90a4cb9a439bd54b5d951bc3"></div>
        </div>
    </div>

</body>
</html>
