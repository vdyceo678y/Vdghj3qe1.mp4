<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videy.co - Galeri Video Viral</title>
  
  <style>
    :root {
      --bg-color: #f0f8ff;
      --card-bg-color: #ffffff;
      --text-color: #333333;
      --primary-color: #bf6002;
      --hover-color: #fa7b05;
      --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    body {
      background-color: var(--bg-color);
      font-family: -apple-system, system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      color: var(--text-color);
    }

    h1 {
      text-align: center;
      color: var(--primary-color);
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      margin-bottom: 30px;
    }

    .gallery-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .video-card {
      background: var(--card-bg-color);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .video-card:hover {
      transform: translateY(-8px);
    }

    .video-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      cursor: pointer;
    }

    .video-info {
      padding: 15px;
      text-align: center;
      flex-grow: 1;
    }

    .video-info h3 {
      margin: 0 0 15px 0;
      font-size: 1rem;
    }

    .btn-watch {
      display: inline-block;
      background: var(--primary-color);
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .btn-watch:hover {
      background: var(--hover-color);
    }

    /* MODAL STYLES */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      width: 90%;
      max-width: 800px;
      position: relative;
    }

    .modal-content video {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .close-modal {
      position: absolute;
      top: -40px;
      right: 0;
      color: white;
      font-size: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px;
      color: #777;
    }
  </style>
</head>
<body>

  <h1>🎬 Viral Video Gallery</h1>

  <main class="gallery-container">
    <!-- Video Item 1 -->
    <div class="video-card">
      <img src="1.jpg" alt="Video 1" onclick="openVideo('https://vdyceo678y.github.io')">
      <div class="video-info">
        <h3>Caught you staring now rate it 😍</h3>
        <button class="btn-watch" onclick="openVideo('https://vdyceo678y.github.io')">Watch Video</button>
      </div>
    </div>

    <!-- Video Item 2 -->
    <div class="video-card">
      <img src="2.jpg" alt="Video 2" onclick="openVideo('https://vdyceo678y.github.io')">
      <div class="video-info">
        <h3>Chillen and winning 🍃🌹</h3>
        <button class="btn-watch" onclick="openVideo('https://vdyceo678y.github.io')">Watch Video</button>
      </div>
    </div>

    <!-- Video Item 3 -->
    <div class="video-card">
      <img src="3.jpg" alt="Video 3" onclick="openVideo('https://vdyceo678y.github.io')">
      <div class="video-info">
        <h3>Little Miah 💖</h3>
        <button class="btn-watch" onclick="openVideo('https://vdyceo678y.github.io')">Watch Video</button>
      </div>
    </div>
  </main>

  <!-- Video Modal Player -->
  <div id="videoModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeVideo()">&times;</span>
      <video id="mainPlayer" controls autoplay>
        <source src="" type="video/mp4">
        Browser kamu tidak mendukung pemutar video.
      </video>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Videy.co - Curated Viral Content</p>
  </footer>

  <script>
    const modal = document.getElementById('videoModal');
    const player = document.getElementById('mainPlayer');

    function openVideo(url) {
      player.src = url;
      modal.style.display = 'flex';
      player.play();
    }

    function closeVideo() {
      modal.style.display = 'none';
      player.pause();
      player.src = "";
    }

    // Tutup modal jika klik di luar video
    window.onclick = function(event) {
      if (event.target == modal) {
        closeVideo();
      }
    }
  </script>

</body>
</html>
